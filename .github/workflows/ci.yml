name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        run: pip install ruff mypy

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: osrf/ros:humble-desktop
    steps:
      - name: Fix git for container checkout
        run: |
          apt-get update && apt-get install -y --no-install-recommends git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v5

      - name: Install Python deps
        run: pip3 install anthropic pytest

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build --packages-select walk_talk_run_core walk_talk_run_llm

      - name: Test
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test --packages-select walk_talk_run_core walk_talk_run_llm
          colcon test-result --verbose
